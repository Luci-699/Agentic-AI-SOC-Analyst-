<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HallucinatingCrusaders Dashboard{% endblock %}</title>
    
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- HTMX for Dynamic SPA-like updates -->
    <script src="https://unpkg.com/htmx.org@1.9.5"></script>
    
    <!-- Chart.js for beautiful analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Custom Premium Vanilla CSS (No Tailwind) -->
    <style>
        :root {
            /* Neon Geospatial Luminescence Color Palette */
            --bg-dark: #0e1322;
            --bg-sidebar: #161b2b;
            --bg-card: rgba(22, 27, 43, 0.7);
            --bg-card-hover: rgba(37, 41, 58, 0.85);
            --border-glow: rgba(0, 251, 251, 0.15);
            --border-ghost: rgba(58, 74, 73, 0.25);
            
            --text-main: #dee1f7;
            --text-muted: #94a3b8;
            --text-white: #ffffff;
            
            --color-cyan: #00fbfb;
            --color-purple: #ecb1ff;
            --color-purple-dark: #d05bff;
            
            --color-critical: #ff5f5f;
            --color-high: #ff914d;
            --color-medium: #fcd34d;
            --color-low: #34d399;
            --color-info: #60a5fa;

            --font-headline: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;

            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Base resets */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6, .display-font {
            font-family: var(--font-headline);
            letter-spacing: -0.02em;
            color: var(--text-white);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* Layout */
        .sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-ghost);
            display: flex;
            flex-col: column;
            flex-direction: column;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 100;
        }

        .main-content {
            margin-left: 260px;
            flex-grow: 1;
            padding: 2rem;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 251, 251, 0.03) 0%, transparent 60%);
        }

        /* Sidebar components */
        .sidebar-brand {
            padding: 2rem 1.5rem;
            border-bottom: 1px solid var(--border-ghost);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .brand-logo {
            font-size: 1.5rem;
            color: var(--color-cyan);
            text-shadow: 0 0 10px rgba(0, 251, 251, 0.5);
        }

        .brand-text {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .sidebar-menu {
            list-style: none;
            padding: 1.5rem 1rem;
            flex-grow: 1;
        }

        .sidebar-item {
            margin-bottom: 0.5rem;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-weight: 500;
            color: var(--text-muted);
            transition: var(--transition-smooth);
        }

        .sidebar-link:hover {
            color: var(--text-white);
            background-color: rgba(255, 255, 255, 0.05);
        }

        .sidebar-link.active {
            color: var(--bg-dark);
            background: linear-gradient(135deg, var(--color-cyan) 0%, var(--color-purple) 100%);
            font-weight: 600;
            box-shadow: 0 0 15px rgba(0, 251, 251, 0.25);
        }

        .sidebar-link.active i {
            color: var(--bg-dark);
        }

        .sidebar-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--border-ghost);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--color-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-dark);
            font-weight: bold;
        }

        /* Glassmorphism Cards */
        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-ghost);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: var(--transition-smooth);
        }

        .glass-card:hover {
            border-color: var(--border-glow);
            box-shadow: 0 0 20px rgba(0, 251, 251, 0.05);
            background: var(--bg-card-hover);
        }

        .card-header {
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Typography utility */
        .text-glow-cyan {
            text-shadow: 0 0 8px rgba(0, 251, 251, 0.4);
        }
        .text-glow-purple {
            text-shadow: 0 0 8px rgba(236, 177, 255, 0.4);
        }

        /* Badges */
        .neon-badge {
            font-family: var(--font-headline);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
        }

        .neon-badge-cyan {
            background-color: rgba(0, 251, 251, 0.1);
            color: var(--color-cyan);
            border: 1px solid rgba(0, 251, 251, 0.3);
        }

        .neon-badge-purple {
            background-color: rgba(236, 177, 255, 0.1);
            color: var(--color-purple);
            border: 1px solid rgba(236, 177, 255, 0.3);
        }

        /* Status Colors */
        .severity-badge {
            font-size: 0.75rem;
            font-weight: bold;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            color: var(--bg-dark);
        }
        .sev-1 { background-color: var(--color-info); }
        .sev-2 { background-color: var(--color-low); }
        .sev-3 { background-color: var(--color-medium); }
        .sev-4 { background-color: var(--color-high); }
        .sev-5 { background-color: var(--color-critical); }

        /* Buttons */
        .btn-neon {
            background: linear-gradient(135deg, var(--color-cyan) 0%, var(--color-purple) 100%);
            color: var(--bg-dark);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 700;
            font-family: var(--font-headline);
            cursor: pointer;
            transition: var(--transition-smooth);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
        }

        .btn-neon:hover {
            box-shadow: 0 0 20px rgba(0, 251, 251, 0.4);
            transform: scale(1.02);
        }

        .btn-neon:active {
            transform: scale(0.98);
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border-ghost);
            color: var(--text-main);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .btn-ghost:hover {
            border-color: var(--color-cyan);
            color: var(--text-white);
            background: rgba(0, 251, 251, 0.05);
        }

        /* Grid */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
        }

        /* Header controls */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-ghost);
            padding-bottom: 1rem;
        }

        .header-title h1 {
            font-size: 2rem;
            margin-bottom: 0.25rem;
        }

        .header-title p {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        /* Global alerts list table styling */
        table.neon-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            text-align: left;
        }

        table.neon-table th {
            padding: 1rem;
            border-bottom: 1px solid var(--border-ghost);
            color: var(--text-white);
            font-family: var(--font-headline);
            font-weight: 600;
        }

        table.neon-table td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 0.875rem;
        }

        table.neon-table tr:hover td {
            background-color: rgba(255, 255, 255, 0.02);
            color: var(--text-white);
        }

        /* Glow effects for text */
        .text-cyan { color: var(--color-cyan); }
        .text-purple { color: var(--color-purple); }
        .text-green-glow {
            color: #34d399;
            text-shadow: 0 0 8px rgba(52, 211, 153, 0.3);
        }
        .text-red-glow {
            color: #ff5f5f;
            text-shadow: 0 0 8px rgba(255, 95, 95, 0.3);
        }

        /* Decorative ambient glow nodes */
        .ambient-glow-1 {
            position: fixed;
            top: 10%;
            right: 0;
            width: 300px;
            height: 300px;
            background: rgba(0, 251, 251, 0.03);
            filter: blur(100px);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }

        .ambient-glow-2 {
            position: fixed;
            bottom: 10%;
            left: 20%;
            width: 400px;
            height: 400px;
            background: rgba(236, 177, 255, 0.02);
            filter: blur(120px);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }

        /* Responsive sidebar hide */
        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
            }
            .brand-text, .link-text, .user-name {
                display: none;
            }
            .main-content {
                margin-left: 70px;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>

    <!-- Sidebar Navigation -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <i class="fa-solid fa-shield-halved brand-logo"></i>
            <span class="brand-text display-font">ANTIGRAVITY</span>
        </div>
        <ul class="sidebar-menu">
            <li class="sidebar-item">
                <a href="/dashboard/alerts" class="sidebar-link {% if active_tab == 'alerts' %}active{% endif %}">
                    <i class="fa-solid fa-list-check"></i>
                    <span class="link-text">Alerts Feed</span>
                </a>
            </li>
            <li class="sidebar-item">
                <a href="/dashboard/response" class="sidebar-link {% if active_tab == 'response' %}active{% endif %}">
                    <i class="fa-solid fa-bolt"></i>
                    <span class="link-text">Response Center</span>
                </a>
            </li>
            <li class="sidebar-item">
                <a href="/dashboard/connectors" class="sidebar-link {% if active_tab == 'connectors' %}active{% endif %}">
                    <i class="fa-solid fa-plug"></i>
                    <span class="link-text">Connectors</span>
                </a>
            </li>
            <li class="sidebar-item">
                <a href="/dashboard/monitor" class="sidebar-link {% if active_tab == 'monitor' %}active{% endif %}">
                    <i class="fa-solid fa-heart-pulse"></i>
                    <span class="link-text">Health Monitor</span>
                </a>
            </li>
            <li class="sidebar-item">
                <a href="/dashboard/analytics" class="sidebar-link {% if active_tab == 'analytics' %}active{% endif %}">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span class="link-text">Analytics Report</span>
                </a>
            </li>
        </ul>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar">
                    {{ user.sub[0].upper() if user and user.sub else 'A' }}
                </div>
                <span class="user-name">{{ user.sub if user else 'Analyst' }}</span>
            </div>
            <a href="/logout" title="Sign Out" class="text-muted hover:text-white" style="font-size: 1.1rem;">
                <i class="fa-solid fa-right-from-bracket"></i>
            </a>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
